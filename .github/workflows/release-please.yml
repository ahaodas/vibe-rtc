name: Release Please

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}

    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          target-branch: master

  verify:
    runs-on: ubuntu-latest
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.21.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test rtc-core
        run: pnpm --filter @vibe-rtc/rtc-core test

      - name: Test rtc-react
        run: pnpm --filter @vibe-rtc/rtc-react test

      - name: Test rtc-firebase
        run: pnpm --filter @vibe-rtc/rtc-firebase test

      - name: Build libraries
        run: pnpm build:all

  publish:
    runs-on: ubuntu-latest
    needs: [release-please, verify]
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.21.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate npm token
        run: test -n "$NODE_AUTH_TOKEN" || (echo "Missing NPM_TOKEN secret"; exit 1)

      - name: Configure npm auth
        run: |
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > ~/.npmrc
          npm whoami

      - name: Publish packages
        run: pnpm -r --filter @vibe-rtc/rtc-core --filter @vibe-rtc/rtc-firebase --filter @vibe-rtc/rtc-react publish --access public --no-git-checks --report-summary